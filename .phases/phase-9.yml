notes:
- date: 2026-03-06
  content: 'Objectif: Alternative à Jira, Made in France, rapide et simple'
- date: 2026-03-06
  content: 'Cible: Startups, PME, administrations françaises'
- date: 2026-03-06
  content: 'Modèle: Hybride local/SaaS - CLI gratuit offline, SaaS freemium pour équipes'
- date: 2026-03-06
  content: 'Connecté: CLI utilise API REST, DB PostgreSQL = source de vérité'
- date: 2026-04-19
  content: 'Etude concurrence: Linear (rapide, opinionate, $8/u/m), Plane (OSS, self-host, Django+Next), Height (AI-native), Jira (enterprise bloat). GAP: aucun outil CLI-first, offline-first avec fichiers plats versionnables. Positionnement: Git for project management.'
- date: 2026-04-19
  content: 'MVP features: Free local (CLI+YAML, deja fait), Free SaaS (1 projet, compte, dashboard), Team 5-8€/u/m (multi-user, sync CLI<->cloud, roles, notifs), Enterprise (SSO, audit, EU hosting)'
- date: 2026-04-19
  content: 'Stack choisie: SQLx (compile-time checked, leger, raw SQL) + PostgreSQL. Frontend: HTMX + Askama (deja en place, SSR, simple). Pas de SeaORM (trop lourd), pas de Leptos (trop jeune pour MVP).'
- date: 2026-04-19
  content: 'Schema DB: users, organizations, org_members, projects, phases, phase_dependencies, tasks, tags, task_tags, task_files, task_blocks, notes, activity_log. UUIDs partout, JSONB pour metadata activity_log.'
- date: 2026-04-19
  content: 'Pricing: Free (1 user, 1 projet cloud, CLI illimite), Team 6€/u/m (illimite, roles, sync), Enterprise (SSO, dedie EU, support prio). Mode local/cloud via config.yml, commandes push/pull/clone.'
- date: 2026-04-19
  content: 'Decision archi: split frontend/backend. Backend = API REST axum (Rust), Frontend SaaS = Next.js (shadcn/ui, Tailwind, next-auth). Le HTMX+Askama reste pour roadmap serve local uniquement. Meme API, deux consommateurs.'
