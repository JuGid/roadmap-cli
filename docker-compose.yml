services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: roadmap
      POSTGRES_USER: roadmap
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-roadmap-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U roadmap -d roadmap"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://roadmap:${POSTGRES_PASSWORD:-roadmap-secret}@postgres:5432/roadmap
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
    ports:
      - "7878:7878"

volumes:
  postgres_data:
